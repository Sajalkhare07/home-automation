<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home Automation — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">⌂</div>
      <h1>HomeAuto</h1>
      <p>Smart control for your home</p>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary" id="login-btn">
        Login
      </button>
      <div id="login-error" class="error-msg hidden"></div>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Sajal Kumar" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters" required />
      </div>
      <button type="submit" class="btn-primary" id="signup-btn">
        Create Account
      </button>
      <div id="signup-error" class="error-msg hidden"></div>
    </form>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
